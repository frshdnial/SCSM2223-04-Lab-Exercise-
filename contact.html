<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Me</title>
</head>
<body style="background-color: #f4f6fb; font-family: Arial;">

	<h1 style="color: navy">Contact Me</h1>
	
	<form action="#" method="post" style="background-color: white; padding: 20 px; border: 2px solid #ccc; width: 500px;">

		<fieldset style="border: 2px solid navy; padding: 15px;">

			<legend style="font-size: 18px; color: navy;">Personal Information</legend>

			<label for="fullname">Full Name:</label><br>
				<input type="text" id="fullname" name="fullname" style="border: 2px solid navy; padding: 6px;" placeholder="Your full name" required maxlength="60" required><br><br>

			<label for="email">Email Address:</label><br>
				<input type="email" id="email" name="email" style="border: 2px solid green; padding: 6px;" placeholder="example@gmail.com" required><br><br>

			<label for="phone">Phone Number:</label><br>
				<input type="tel" id="phone" name="phone" style="border: 2px solid purple; padding: 6px;" placeholder="012-3456789" required><br><br>

			<label for="age">Age:</label><br>
				<input type="number" id="age" name="age" style="border: 2px solid teal; padding: 6px;" min="18" mac="100" required><br><br>

			<label for="date">Preffered Contact Date:</label><br>
				<input type="date" id="date" name="date" style="border: 2px solid orange; padding: 6px;" required><br><br>

		</fieldset>

		<br>

		<fieldset style="border: 2px solid darkgreen; padding: 15px">
			<legend style="font-size: 18px; color: darkgreen;">Subject</legend>

			<label for="subject">Choose a topic:</label><br>
			<select id="subject" name="subject" style="padding: 6px; border: 2px solid darkgreen;">

				<optgroup label="Project Inquiry">
					<option>Web Development</option>
					<option>App Development</option>
				</optgroup>
			
				<optgroup label="General">
					<option>General Question</option>
					<option>Feedback</option>
				</optgroup>
			</select>
		</fieldset>

		<br>

		<fieldset style="border: 2px solid brown; padding: 15px">
			<legend style="font-size: 18px; color: brown;">Technologies Interested In</legend>

			<input type="checkbox" id="html" name="tech" value="html">
			<label for="html">HTML</label><br>

			<input type="checkbox" id="css" name="tech" value="css">
			<label for="css">CSS</label><br>

			<input type="checkbox" id="javascript" name="tech" value="javascript">
			<lable for="javascript">Javascript</lable><br>
		</fieldset>

		<br>

		<fieldset style="border: 2px solid crimson; padding: 15px">
			<legend style="font-size: 18px; color: crimson">Preferred Contact Method</legend>

			<input type="radio" id="emailContact" name="contactMethod" value="email" required>
			<label for="emailContact">Email</label><br>
				
			<input type="radio" id="phoneContact" name="contactMethod" value="phone">
			<label for="phoneContact">Phone</label><br>

			<input type="radio" id="whatsappContact" name="contactMethod" value="whatsapp">
			<label for="whatsappContact">Whatsapp</label><br>
		</fieldset>
		
		<br>

		<fieldset style="border: 2px solid purple; padding: 15px;">
			<legend style="font-size: 18px; color: purple;">Project Budget Estimation</legend>

			<label for="budget">Budget Range:</label><br>
			<input type="range" id='budget' name="budget" min="100" max="10000" style="width: 100%;"> 
		</fieldset>

		<br>

		<fieldset style="border: 2px solid gray; padding: 15px;">
			<legend style="font-size: 18px;">Message:</legend>

			<label for="message">Your Message:</label><br>
			<textarea id="message" name="message" rows="4" cols="40" style="border: 2px solid gray; padding: 6px" placeholder="Write your message here..." maxlength="300" required></textarea>
		</fieldset>

		<br>

		<button type="submit" style="background-color: navy; color: white; padding: 10px; border: none; font-size: 16px;">
			Send Message
		</button>
	</form>
</body>
</html>
