<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Contact Me</title>

	 <link rel="stylesheet" href="style.css">
</head>
<body>

	<h1>Contact Me</h1>
	
	<form action="#" method="post">

		<fieldset>

			<legend>Personal Information</legend>

			<label for="fullname">Full Name:</label><br>
			<input type="text" id="fullname" name="fullname" placeholder="Your full name" maxlength="60" required><br><br>

			<label for="email">Email Address:</label><br>
			<input type="email" id="email" name="email" placeholder="example@gmail.com" required><br><br>

			<label for="phone">Phone Number:</label><br>
			<input type="tel" id="phone" name="phone" placeholder="012-3456789" required><br><br>

			<label for="age">Age:</label><br>
			<input type="number" id="age" name="age" min="18" max="100" required><br><br>

			<label for="date">Preffered Contact Date:</label><br>
			<input type="date" id="date" name="date" required><br><br>

		</fieldset>

		<br>

		<fieldset>
			<legend>Subject</legend>

			<label for="subject">Choose a topic:</label><br>
			<select id="subject" name="subject">

				<optgroup label="Project Inquiry">
					<option>Web Development</option>
					<option>App Development</option>
				</optgroup>
			
				<optgroup label="General">
					<option>General Question</option>
					<option>Feedback</option>
				</optgroup>
			</select>
		</fieldset>

		<br>

		<fieldset>
			<legend>Technologies Interested In</legend>

			<input type="checkbox" id="html" name="tech" value="html">
			<label for="html">HTML</label><br>

			<input type="checkbox" id="css" name="tech" value="css">
			<label for="css">CSS</label><br>

			<input type="checkbox" id="javascript" name="tech" value="javascript">
			<label for="javascript">Javascript</label><br>
		</fieldset>

		<br>

		<fieldset>
			<legend>Preferred Contact Method</legend>

			<input type="radio" id="emailContact" name="contactMethod" value="email" required>
			<label for="emailContact">Email</label><br>
				
			<input type="radio" id="phoneContact" name="contactMethod" value="phone">
			<label for="phoneContact">Phone</label><br>

			<input type="radio" id="whatsappContact" name="contactMethod" value="whatsapp">
			<label for="whatsappContact">Whatsapp</label><br>
		</fieldset>
		
		<br>

		<fieldset>
			<legend>Project Budget Estimation</legend>

			<label for="budget">Budget Range:</label><br>
			<input type="range" id="budget" name="budget" min="100" max="10000">
		</fieldset>

		<br>

		<fieldset>
			<legend>Message:</legend>

			<label for="message">Your Message:</label><br>
			<textarea id="message" name="message" rows="4" cols="40" placeholder="Write your message here..." maxlength="300" required></textarea>
		</fieldset>

		<br>

		<button type="submit">
			Send Message
		</button>

	</form>
</body>
</html>
